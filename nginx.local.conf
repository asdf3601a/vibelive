worker_processes auto;
error_log /home/kilo/vibe-livestream/nginx_error.log warn;
pid /home/kilo/vibe-livestream/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /home/kilo/vibe-livestream/nginx_access.log;
    proxy_temp_path /tmp/nginx_proxy_temp 1 2;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    server {
        listen 8080;
        server_name localhost;

        # Frontend static files (SPA)
        location / {
            root /home/kilo/vibe-livestream/frontend/dist;
            try_files $uri $uri/ /index.html;
        }

        # API reverse proxy to Rust live server
        location /api/ {
            proxy_pass http://localhost:8081;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # HLS reverse proxy to Rust live server
        location /hls/ {
            proxy_pass http://localhost:8081;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control no-cache;
        }

        # Recordings static files (served directly by nginx)
        location /recordings/ {
            alias /home/kilo/vibe-livestream/data/recordings/;
            add_header Cache-Control "public, max-age=3600";
            autoindex off;
        }

        # Recording thumbnails
        location /recordings/thumbnails/ {
            alias /home/kilo/vibe-livestream/data/thumbnails/recordings/;
            add_header Cache-Control "public, max-age=3600";
            autoindex off;
        }
    }
}
