services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: livestream-backend
    ports:
      - "1935:1935"
    expose:
      - "8080"
    environment:
      - RTMP_HOST=0.0.0.0
      - RTMP_PORT=1935
      - API_HOST=0.0.0.0
      - API_PORT=8080
      - MEDIA_DIR=/data
      - RUST_LOG=info
    volumes:
      - ./data:/data
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: livestream-nginx
    ports:
      - "8080:80"
    volumes:
      - ./data:/data:ro
    depends_on:
      - backend
    restart: unless-stopped
